name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  quality:
    name: Lint & Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Create venv & install dev dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install '.[dev]'

      - name: Run check-files.sh
        run: bash scripts/check-files.sh

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Create venv & install test dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install pytest==8.4.1 python-dotenv==1.1.1

      - name: Run run-lib-tests.sh
        run: bash scripts/run-lib-tests.sh
        env:
          JUDILIBRE_API_KEY: ${{ secrets.JUDILIBRE_API_KEY }}
